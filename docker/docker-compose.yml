version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-your-secret-key}
    command: ./qdrant --http-port 6333 --grpc-port 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Documentation Compliance Agent
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: compliance_agent
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-your-secret-key}
      - WEBSITE_URL=${WEBSITE_URL}
      - WEBSITE_USERNAME=${WEBSITE_USERNAME}
      - WEBSITE_PASSWORD=${WEBSITE_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    command: python -m src.main run --config config/base_config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
    driver: local

networks:
  default:
    name: compliance_network
