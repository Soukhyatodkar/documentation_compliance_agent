[pytest]
# Pytest configuration

minversion = 7.0
addopts = 
    -ra 
    -q 
    --strict-markers 
    --tb=short
    
testpaths = 
    tests

python_files = 
    test_*.py
    *_test.py

python_classes = 
    Test*

python_functions = 
    test_*

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (deselect with '-m "not slow"')
    e2e: End-to-end tests
    qdrant: Tests requiring Qdrant
    playwright: Tests requiring Playwright
    openai: Tests requiring OpenAI API
    asyncio: Async tests
